name: update-routing-rules

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install v2dat
        run: go install github.com/urlesistiana/v2dat@latest

      - name: Download source dat files
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat \
            -o /tmp/geosite-src.dat
          curl -fsSL \
            https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat \
            -o /tmp/geoip-src.dat

      - name: Unpack source dat files
        run: |
          mkdir -p /tmp/geosite-all /tmp/geoip-all
          v2dat unpack geosite -f /tmp/geosite-src.dat -o /tmp/geosite-all/
          v2dat unpack geoip   -f /tmp/geoip-src.dat   -o /tmp/geoip-all/
          cd /tmp/geosite-all && for f in *; do [ "$f" != "${f,,}" ] && mv "$f" "${f,,}"; done; true
          cd /tmp/geoip-all   && for f in *; do [ "$f" != "${f,,}" ] && mv "$f" "${f,,}"; done; true

      - name: Stage needed categories
        run: |
          mkdir -p /tmp/geosite-slim /tmp/geoip-slim

          cp /tmp/geosite-all/private                    /tmp/geosite-slim/
          cp /tmp/geosite-all/ru-available-only-inside   /tmp/geosite-slim/
          cp /tmp/geosite-all/ru-blocked                 /tmp/geosite-slim/
          cp /tmp/geosite-all/category-ads               /tmp/geosite-slim/

          cp /tmp/geoip-all/private                      /tmp/geoip-slim/
          cp /tmp/geoip-all/ru-blocked                   /tmp/geoip-slim/

      - name: Pack slim dat files
        run: |
          mkdir -p release
          v2dat pack geosite -o release/geosite.dat /tmp/geosite-slim/*
          v2dat pack geoip   -o release/geoip.dat   /tmp/geoip-slim/*

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/geosite.dat release/geoip.dat
          git diff --staged --quiet && exit 0
          git commit -m "chore: update routing rules $(date -u +%Y-%m-%d)"
          git push