name: update-routing-rules

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: false

      - name: Install v2dat
        run: go install github.com/urlesistiana/v2dat@latest

      - name: Download source dat files
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geosite.dat \
            -o /tmp/geosite-src.dat
          curl -fsSL \
            https://raw.githubusercontent.com/runetfreedom/russia-v2ray-rules-dat/release/geoip.dat \
            -o /tmp/geoip-src.dat

      - name: Unpack source dat files
        run: |
          mkdir -p /tmp/geosite-all /tmp/geoip-all
          v2dat unpack geosite -o /tmp/geosite-all/ /tmp/geosite-src.dat
          v2dat unpack geoip   -o /tmp/geoip-all/   /tmp/geoip-src.dat
          cd /tmp/geosite-all && for f in *; do [ "$f" != "${f,,}" ] && mv "$f" "${f,,}"; done; true
          cd /tmp/geoip-all   && for f in *; do [ "$f" != "${f,,}" ] && mv "$f" "${f,,}"; done; true

      - name: Stage needed categories
        run: |
          mkdir -p /tmp/geosite-slim /tmp/geoip-slim

          cp /tmp/geosite-all/geosite-src_private.txt                  /tmp/geosite-slim/private
          cp /tmp/geosite-all/geosite-src_ru-available-only-inside.txt /tmp/geosite-slim/ru-available-only-inside
          cp /tmp/geosite-all/geosite-src_ru-blocked.txt               /tmp/geosite-slim/ru-blocked
          cp /tmp/geosite-all/geosite-src_category-ads-all.txt         /tmp/geosite-slim/category-ads-all

          cp /tmp/geoip-all/geoip-src_private.txt                      /tmp/geoip-slim/private
          cp /tmp/geoip-all/geoip-src_ru-blocked.txt                   /tmp/geoip-slim/ru-blocked

      - name: Pack slim geosite dat files
        run: |
          git clone --depth 1 https://github.com/v2fly/domain-list-community
          cd domain-list-community
          mkdir -p ../release
          go run ./ --datapath=/tmp/geosite-slim/
          mv dlc.dat ../release/geosite.dat
          cd ..

      - name: Pack slim geoip dat files
        run: |
          git clone --depth 1 https://github.com/v2fly/geoip
          mkdir -p geoip/config
          cp /tmp/geoip-slim/ru-blocked  geoip/config/ru-blocked.txt
          cp geoip-config.json geoip/config.json
          cd geoip
          go run ./
          mv output/geoip.dat ../release/geoip.dat
          cd ..

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add release/geosite.dat release/geoip.dat
          git diff --staged --quiet && exit 0
          git commit -m "chore: update routing rules $(date -u +%Y-%m-%d)"
          git push
